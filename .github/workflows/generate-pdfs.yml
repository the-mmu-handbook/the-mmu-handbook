# MMU Handbook — PDF Generation Workflow
# Generates per-chapter PDFs and a merged whole-book PDF using Playwright + Chromium.
#
# Triggers:
#   - Manual: Actions tab → "Run workflow"
#   - On release tag: git tag v1.2 && git push --tags
#
# Outputs:
#   - GitHub Release assets: chapter-01.pdf ... chapter-NN.pdf + mmu-handbook-complete.pdf
#   - Build artifact: pdfs/ (retained 30 days)

name: Generate PDFs

on:
  workflow_dispatch:
    inputs:
      chapters_only:
        description: 'Generate per-chapter PDFs only (skip book merge)'
        required: false
        default: 'false'
        type: boolean

  push:
    tags:
      - 'v*'

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright pypdf
          playwright install chromium --with-deps

      - name: Auto-infer chapter count
        id: chapters
        run: |
          N=$(ls chapters/chapter-*-WITH-FIGURES.html 2>/dev/null | wc -l)
          echo "count=$N" >> $GITHUB_OUTPUT
          echo "Chapters found: $N"

      - name: Generate per-chapter PDFs
        run: python3 scripts/generate_pdfs.py --output pdfs/
        env:
          CHAPTERS_DIR: chapters/

      - name: Merge into whole-book PDF
        if: ${{ inputs.chapters_only != 'true' }}
        run: |
          python3 - << 'PYEOF'
          from pathlib import Path
          from pypdf import PdfWriter

          pdf_dir = Path('pdfs')
          chapter_pdfs = sorted(pdf_dir.glob('chapter-*.pdf'))

          if not chapter_pdfs:
              print("No chapter PDFs found")
              exit(1)

          writer = PdfWriter()
          for pdf_path in chapter_pdfs:
              writer.append(str(pdf_path))
              print(f"Added {pdf_path.name}")

          out = pdf_dir / 'mmu-handbook-complete.pdf'
          writer.write(str(out))
          size_mb = out.stat().st_size / (1024 * 1024)
          print(f"Complete book: {out} ({size_mb:.1f} MB, {len(chapter_pdfs)} chapters)")
          PYEOF

      - name: List generated PDFs
        run: |
          ls -lh pdfs/
          echo "Total chapters: ${{ steps.chapters.outputs.count }}"

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmu-handbook-pdfs
          path: pdfs/
          retention-days: 30

      - name: Attach PDFs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pdfs/*.pdf
          body: |
            ## MMU Handbook — ${{ github.ref_name }}

            **${{ steps.chapters.outputs.count }} chapters** — generated by Playwright/Chromium.

            ### Downloads
            - `mmu-handbook-complete.pdf` — full book (all chapters merged)
            - `chapter-XX.pdf` — individual chapters
