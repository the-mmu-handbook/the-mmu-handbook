title: "Memory Management Units and TLBs"
description: "Architecture, Implementation, and AI Workloads"
baseurl: "/the-mmu-handbook"
url: "https://the-mmu-handbook.github.io"

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  parse_block_html: true

theme: minima

# Only the README (index) appears in nav - all other pages hidden
header_pages: []

# Set defaults so chapter pages don't get title auto-detected for nav
defaults:
  - scope:
      path: "chapters-md"
    values:
      sitemap: false

# Suppress auto-nav by excluding chapters folder from site pages list
exclude_from_nav:
  - chapters-md
